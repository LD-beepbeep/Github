<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub App Installer</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    
    <link rel="icon" type="image/svg+xml" href="https://github.githubassets.com/favicons/favicon.svg">
    <link rel="apple-touch-icon" href="https://github.com/fluidicon.png">

    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .container { text-align: center; }
        .timer-text {
            font-size: 1.2rem;
            margin-top: 20px;
            color: #8b949e;
        }
        #countdown {
            font-weight: bold;
            color: #58a6ff;
        }
        .install-hint {
            margin-top: 30px;
            font-size: 0.9rem;
            background: #161b22;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
    </style>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let secondsLeft = 20;

        const countdownInterval = setInterval(() => {
            secondsLeft--;
            document.getElementById('countdown').textContent = secondsLeft;
            
            if (secondsLeft <= 0) {
                clearInterval(countdownInterval);
                window.location.replace("https://github.com");
            }
        }, 1000);
    </script>
</head>
<body>
    <div class="container">
        <h1>GitHub PWA</h1>
        <p class="timer-text">Redirecting in <span id="countdown">20</span> seconds...</p>
        
        <div class="install-hint">
            <strong>Tip:</strong> Click the 🖥️+ (Install) icon in your <br> 
            browser address bar now to save this as an app!
        </div>
    </div>
</body>
</html>
